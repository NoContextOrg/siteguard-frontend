name: Deploy Frontend to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo "🚀 Running FRONTEND deploy script"

            chmod +x /home/ec2-user/siteguard/deploy.sh

            # 🔥 Only deploy frontend
            /home/ec2-user/siteguard/deploy.sh frontend

            echo "✅ Frontend deployment finished"